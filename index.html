<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400..900&family=Hanken+Grotesk:wght@300..800&family=Space+Grotesk:wght@400..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main id="pager" class="pager" aria-label="Pages">

  <!-- ============ PANEL 1 · LOG ============ -->
  <section id="panel-log" class="panel" aria-label="Log">
    <div class="panel-scroll">
      <header class="panel-head">
        <h1 class="panel-title">Log</h1>
        <div class="head-actions">
          <div class="today-chip" id="log-today"></div>
          <button class="icon-btn" data-settings aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>
      <div id="log-steps" class="log-steps">
        <!-- step A: day · step B: exercise · step C: numbers (rendered by log.js) -->
      </div>
    </div>
  </section>

  <!-- ============ PANEL 2 · HISTORY ============ -->
  <section id="panel-history" class="panel" aria-label="History">
    <div class="panel-scroll">
      <header class="panel-head">
        <h1 class="panel-title">History</h1>
        <div class="head-actions">
          <div class="seg" id="history-seg" role="tablist" aria-label="History view">
            <button class="seg-btn is-active" data-view="grid" role="tab">Grid</button>
            <button class="seg-btn" data-view="focus" role="tab">Focus</button>
          </div>
          <button class="icon-btn" data-settings aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>
      <div id="history-body" class="history-body"></div>
    </div>
  </section>

  <!-- ============ PANEL 3 · PROGRESS ============ -->
  <section id="panel-progress" class="panel" aria-label="Progress">
    <div class="panel-scroll">
      <header class="panel-head">
        <h1 class="panel-title">Progress</h1>
        <div class="head-actions">
          <button class="icon-btn" data-settings aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>
      <div id="progress-body" class="progress-body"></div>
    </div>
  </section>

  <!-- ============ PANEL 4 · COACH ============ -->
  <section id="panel-coach" class="panel" aria-label="Coach">
    <div class="coach-wrap">
      <header class="panel-head">
        <h1 class="panel-title">Coach</h1>
        <div class="head-actions">
          <button class="icon-btn" id="coach-history" aria-label="Chat history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 4v4h4M12 8v4l3 2"/></svg>
          </button>
          <button class="icon-btn" id="coach-clear" aria-label="New chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </header>
      <div class="coach-messages" id="coach-messages"></div>
      <form class="coach-composer" id="coach-composer">
        <input class="coach-input" id="coach-input" type="text" placeholder="Ask your coach…" autocomplete="off" enterkeyhint="send">
        <button class="coach-send" id="coach-send" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6"/></svg>
        </button>
      </form>
    </div>
  </section>

</main>

<!-- ============ DOCK ============ -->
<nav class="dock" id="dock" aria-label="Sections">
  <div class="dock-indicator" id="dock-indicator"></div>
  <button class="dock-btn" data-panel="0" aria-label="Log">
    <svg viewBox="0 0 24 24" class="dock-ic"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    <span>Log</span>
  </button>
  <button class="dock-btn" data-panel="1" aria-label="History">
    <svg viewBox="0 0 24 24" class="dock-ic"><path d="M4 5h16M4 5v14h16V5M4 10h16M9 5v14M15 5v14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
    <span>History</span>
  </button>
  <button class="dock-btn" data-panel="2" aria-label="Progress">
    <svg viewBox="0 0 24 24" class="dock-ic"><path d="M4 19L9.5 12l4 4L20 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="20" cy="7" r="1.8" fill="currentColor"/></svg>
    <span>Progress</span>
  </button>
  <button class="dock-btn" data-panel="3" aria-label="Coach">
    <svg viewBox="0 0 24 24" class="dock-ic"><path d="M20 11.5a7.5 7.5 0 0 1-10.9 6.7L4 19.5l1.4-4.2A7.5 7.5 0 1 1 20 11.5z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" fill="none"/></svg>
    <span>Coach</span>
  </button>
</nav>

<!-- ============ SHEET + TOAST (shared) ============ -->
<div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" hidden>
  <div class="sheet-grab"></div>
  <div class="sheet-content" id="sheet-content"></div>
</div>
<div class="toast" id="toast" role="status" hidden></div>

<!-- ============ AUTH GATE (only shown when Firebase is configured) ============ -->
<div class="auth-gate" id="auth-gate" hidden></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
